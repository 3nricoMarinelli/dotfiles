# Options
set-option -g default-terminal 'tmux-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

set -g escape-time 0  # disable delays on escape sequences
set -g mouse on
set -g renumber-windows on  # keep numbering sequential
set -g repeat-time 1000  # increase "prefix-free" window
set -g allow-passthrough on  # required for image.nvim

set -g base-index 1              # start indexing windows at 1 instead of 0
set -g pane-base-index 1
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g default-terminal "${TERM}"
setw -g mode-keys vi

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Plugins
set -g @plugin 'catppuccin/tmux#v2.1.0'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @continuum-restore 'on'

# Save and restore sessions
# set -g @resurrect-strategy-vim 'session'
# set -g @resurrect-strategy-nvim 'session'
# set -g @resurrect-save 'S'
# set -g @resurrect-restore 'R'

# Change prefix
unbind C-b
set -g prefix `
bind ` send-prefix
unbind r
bind r source-file ~/.tmux.conf

# Theme: status (windows)
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #(tmux list-panes -t #I -F '##{pane_current_command}' | uniq)"
set -g @catppuccin_window_current_text " #(tmux list-panes -t #I -F '##{pane_current_command}' | uniq)"
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"
# set -g status-style bg=default
set -g status-position bottom

# Keybindings: disable repeat for arrows (use prefix + arrows for pane navigation)
bind Up select-pane -U
bind Left select-pane -L
bind Down select-pane -D
bind Right select-pane -R

# Keybindings: split
bind h split-window -h
bind | split-window -h
bind v split-window -v
bind - split-window -v

# Keybindings: windows (prefix + number — Alt/Option keys pass through to apps)
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# Keybindings: other
bind f resize-pane -Z
bind q detach-client
bind e choose-window -Z

# Toggle to last window
bind C-a last-window

# Keybindings: move windows (prefix + < / > — Ctrl+Shift+Arrow passes through)
bind-key < swap-window -t -1
bind-key > swap-window -t +1

set -g focus-events on

# prefix + l: clear shell + wipe tmux scrollback (non-intercepting alternative to Cmd+K)
bind l send-keys C-l \; run-shell "sleep 0.1" \; clear-history

# scroll dirtectly entering in copy mode
# Alt+Up enters copy mode and scrolls up immediately
bind -n C-M-Up copy-mode \; send-keys -X page-up
bind -n C-M-Down copy-mode \; send-keys -X page-down

# Alt+arrows work inside copy mode too
bind -T copy-mode C-M-Up   send-keys -X page-up
bind -T copy-mode C-M-Down send-keys -X page-down

run '~/.tmux/plugins/tpm/tpm'
